databases:
  # The PostgreSQL Database
  - name: pantrychef-db
    plan: free

services:
  # The Express Backend Service
  - type: web
    name: pantrychef-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    # For a fresh setup, we use db push to sync the schema. In production, use prisma migrate deploy.
    startCommand: npx prisma db push --accept-data-loss && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pantrychef-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
